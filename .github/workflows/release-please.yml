name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Update README What's New section from CHANGELOG
        if: ${{ steps.release.outputs.release_created }}
        run: |
          if [ ! -f README.md ] || ! grep -q "## What's New" README.md; then
            echo "No README.md or no What's New section found, skipping update."
            exit 0
          fi

          if [ ! -f CHANGELOG.md ]; then
            echo "No CHANGELOG.md found, skipping update."
            exit 0
          fi

          # Extract the latest release section from CHANGELOG.md
          latest_section=$(awk '/^## \[/{if(found) exit; found=1} found' CHANGELOG.md)

          # Replace the What's New section in README.md
          python3 << 'PYEOF'
          import re

          with open("README.md", "r") as f:
              readme = f.read()

          with open("CHANGELOG.md", "r") as f:
              changelog = f.read()

          # Extract latest version section from CHANGELOG
          match = re.search(r'(## \[.+?\n)(?=## \[|\Z)', changelog, re.DOTALL)
          if not match:
              print("No version section found in CHANGELOG.md")
              exit(0)

          latest = match.group(1).strip()

          # Replace What's New section in README
          pattern = r"(## What's New\n).*?(?=\n## |\Z)"
          replacement = rf"\1\n{latest}\n"
          new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open("README.md", "w") as f:
              f.write(new_readme)
          PYEOF

          if git diff --quiet README.md; then
            echo "No changes to README.md"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README What's New section"
          git push
